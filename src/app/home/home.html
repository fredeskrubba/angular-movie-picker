
<main [class.show-details]="selectedMovie()">
    <div class="home-content">
        <div class="desktop-searchbar">
            <input #searchQuery type="text" placeholder="Search for movie title" (input)="onSearchUpdated(searchQuery.value)">
        </div>
        
        <div class="movie-grid-desktop">
            @for (movie of items(); track movie.id){
                <app-movie-card
                    [title]="movie.title"
                    [posterURL]="movie.poster_path"
                    (detailsClicked)="toggleDetails(movie)"
                    [selectedMovie]="movie.id === selectedMovie()?.id"
                >
                </app-movie-card>
            }
        </div>
        <div class="movie-grid-mobile">
            @for (movie of items(); track movie.id){
                <app-movie-card-mobile [movieInfo]="movie"></app-movie-card-mobile>
            }
        </div>
    </div>
    
    @if(selectedMovie()){
      <app-movie-details [selectedMovie]="selectedMovie()"/>
    }
</main>
