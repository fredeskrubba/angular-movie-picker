
<main [class.show-details]="selectedMovie()">
    <div class="home-content">
        <div class="desktop-searchbar">
            <input #searchQuery type="text" placeholder="Search for titles, actors, genres or keywords" (input)="onSearchUpdated(searchQuery.value)">
            <button>Search</button>
        </div>
        
        <div class="movie-grid">
            @for (movie of items(); track movie.id){
                <app-movie-card
                    [title]="movie.title"
                    [posterURL]="movie.poster_path"
                    (detailsClicked)="toggleDetails(movie)"
                    [selectedMovie]="movie.id === selectedMovie()?.id"
                >
                </app-movie-card>
            }
        </div>
    </div>
    
    @if(selectedMovie()){
      <app-movie-details [selectedMovie]="selectedMovie()"/>
    }
</main>
